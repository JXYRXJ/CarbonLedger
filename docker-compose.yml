version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: carbonledger_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: carbonledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carbonledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carbonledger_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/carbonledger
      - SECRET_KEY=supersecretkeychangeinproduction1234567890abcdef
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - FRONTEND_URL=http://localhost:5173
      - BACKEND_URL=http://localhost:8000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
